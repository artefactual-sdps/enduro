on:
  pull_request:
  push:
    branches:
      - main
name: Tilt CI
jobs:
  tilt-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Create k8s cluster
        uses: AbsaOSS/k3d-action@4e8b3239042be1dc0aed6c5eb80c13b18200fc79 # v2.4.0
        with:
          cluster-name: sdps-ci
          k3d-version: v5.8.3
          args: >-
            --registry-create sdps-ci-registry
            --no-lb
            --timeout 180s
            --k3s-arg "--disable=traefik,servicelb,metrics-server@server:*"
            --k3s-arg "--kubelet-arg=eviction-hard=imagefs.available<1%,nodefs.available<1%@server:*"
      - name: Install Tilt
        uses: yokawasa/action-setup-kube-tools@b16d49b2c459d33cf9d4c300a220ef0bcdbc730a # v0.14.0
        with:
          setup-tools: |
            tilt
          tilt: v0.35.2
      - name: Check tilt ci
        run: tilt ci
