---
# Source: temporal/templates/server-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: "temporal-config"
  labels:
    app.kubernetes.io/name: temporal
    helm.sh/chart: temporal-1.0.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: temporal
    app.kubernetes.io/version: "1.30.3"
    app.kubernetes.io/part-of: temporal
data:
  config_template.yaml: |-
    # enable-template
    log:
      stdout: true
      level: "debug,info"

    persistence:
      datastores:
        default:
          sql:
            connectAddr: mysql.enduro-sdps:3306
            connectProtocol: tcp
            databaseName: temporal
            password: {{ env "TEMPORAL_DEFAULT_STORE_PASSWORD" | quote }}
            pluginName: mysql8
            user: enduro
        visibility:
          sql:
            connectAddr: mysql.enduro-sdps:3306
            connectProtocol: tcp
            databaseName: temporal_visibility
            password: {{ env "TEMPORAL_VISIBILITY_STORE_PASSWORD" | quote }}
            pluginName: mysql8
            user: enduro
      defaultStore: default
      numHistoryShards: 512
      visibilityStore: visibility

    global:
      membership:
        name: temporal
        maxJoinDuration: 30s
        broadcastAddress: {{ env "POD_IP" | quote }}

      pprof:
        port: 7936

      metrics:
        tags:
          type: {{ env "TEMPORAL_SERVICES" | quote }}
        prometheus:
          listenAddress: 0.0.0.0:9090
          timerType: histogram

    services:
      frontend:
        rpc:
          grpcPort: 7233
          httpPort: 7243
          membershipPort: 6933
          bindOnIP: "0.0.0.0"

      history:
        rpc:
          grpcPort: 7234
          membershipPort: 6934
          bindOnIP: "0.0.0.0"

      matching:
        rpc:
          grpcPort: 7235
          membershipPort: 6935
          bindOnIP: "0.0.0.0"

      worker:
        rpc:
          membershipPort: 6939
          bindOnIP: "0.0.0.0"

    clusterMetadata:
      enableGlobalNamespace: false
      failoverVersionIncrement: 10
      masterClusterName: "active"
      currentClusterName: "active"
      clusterInformation:
        active:
          enabled: true
          initialFailoverVersion: 1
          rpcName: "temporal-frontend"
          rpcAddress: "127.0.0.1:7233"
          httpAddress: "127.0.0.1:7243"

    dcRedirectionPolicy:
      policy: "noop"
      toDC: ""

    archival:
      status: "disabled"
    publicClient:
      hostPort: "temporal-frontend:7233"

    dynamicConfigClient:
      filepath: "/etc/temporal/dynamic_config/dynamic_config.yaml"
      pollInterval: "10s"
---
