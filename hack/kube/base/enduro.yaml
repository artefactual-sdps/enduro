apiVersion: apps/v1
kind: Deployment
metadata:
  name: enduro
  labels:
    app: enduro
spec:
  selector:
    matchLabels:
      app: enduro
  template:
    metadata:
      labels:
        app: enduro
    spec:
      serviceAccountName: sdps
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-internal-storage
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p \
                /home/enduro/internal-storage/ingest \
                /home/enduro/internal-storage/storage \
                /home/enduro/internal-storage/sip-source \
                /home/enduro/internal-storage/watched \
                /home/enduro/internal-storage/watched-complete \
                /home/enduro/internal-storage/perma-aips
              chown -R 1000:1000 /home/enduro/internal-storage
          volumeMounts:
            - name: enduro-internal-storage
              mountPath: /home/enduro/internal-storage
        - name: check-temporal
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            [
              "sh",
              "-c",
              "until echo STATUS | nc -w 2 temporal-frontend.enduro-sdps 7233; do echo waiting for temporal to start; sleep 1; done;",
            ]
      containers:
        - name: enduro
          image: ghcr.io/artefactual-sdps/enduro:main
          command:
            - /home/enduro/bin/enduro
          args:
            - --config
            - /home/enduro/enduro-config/enduro.toml
          env:
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
            - name: ENDURO_DATABASE_DSN
              value: $(MYSQL_USER):$(MYSQL_PASSWORD)@tcp(mysql.enduro-sdps:3306)/enduro
            - name: ENDURO_STORAGE_DATABASE_DSN
              value: $(MYSQL_USER):$(MYSQL_PASSWORD)@tcp(mysql.enduro-sdps:3306)/enduro_storage
            - name: ENDURO_TELEMETRY_TRACES_ENABLED
              value: "true"
            - name: ENDURO_TELEMETRY_TRACES_ADDRESS
              value: "grafana-alloy.enduro-sdps:4317"
            - name: ENDURO_TELEMETRY_TRACES_SAMPLING_RATIO
              value: "1.0"
          ports:
            - containerPort: 9000
            - containerPort: 9002
          volumeMounts:
            - name: enduro-config
              mountPath: /home/enduro/enduro-config
              readOnly: true
            - name: enduro-internal-storage
              mountPath: /home/enduro/internal-storage
          resources: {}
      volumes:
        - name: enduro-config
          secret:
            secretName: enduro-config
        - name: enduro-internal-storage
          persistentVolumeClaim:
            claimName: enduro-internal-storage
---
apiVersion: v1
kind: Service
metadata:
  name: enduro
  labels:
    app: enduro
spec:
  selector:
    app: enduro
  ports:
    - name: api
      port: 9000
    - name: internalapi
      port: 9002
