apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: enduro-sdps
resources:
  - lgtm.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: lgtm-prometheus-config
    files:
      - prometheus.yaml
  - name: lgtm-alloy-config
    files:
      - config.alloy
