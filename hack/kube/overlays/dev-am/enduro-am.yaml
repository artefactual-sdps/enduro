apiVersion: apps/v1
kind: Deployment
metadata:
  name: enduro-am
  labels:
    app: enduro-am
spec:
  serviceName: enduro-am
  selector:
    matchLabels:
      app: enduro-am
  template:
    metadata:
      labels:
        app: enduro-am
    spec:
      serviceAccountName: sdps
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: check-temporal
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            [
              "sh",
              "-c",
              "until echo STATUS | nc -w 2 temporal.enduro-sdps 7233; do echo waiting for temporal to start; sleep 1; done;",
            ]
        - name: ambox-known-hosts
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache openssh-client >/dev/null
              # Create a private SSH dir owned by the worker user (uid/gid 1000).
              install -d /ssh
              chown 1000:1000 /ssh
              chmod 0700 /ssh
              # Copy the private key with strict perms for the worker user.
              cp /ssh-secret/id_ed25519 /ssh/id_ed25519
              chown 1000:1000 /ssh/id_ed25519
              chmod 0600 /ssh/id_ed25519
              # Generate known_hosts with readable perms for the worker user.
              ssh-keyscan -H -p 64022 ambox.enduro-sdps > /ssh/known_hosts
              chown 1000:1000 /ssh/known_hosts
              chmod 0644 /ssh/known_hosts
          volumeMounts:
            - name: ssh-secret
              mountPath: /ssh-secret
              readOnly: true
            - name: ssh-volume
              mountPath: /ssh
      containers:
        - name: enduro-am-worker
          image: ghcr.io/artefactual-sdps/enduro-am-worker:main
          env:
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
            - name: MINIO_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: user
            - name: MINIO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: password
            - name: ENDURO_DATABASE_DSN
              value: $(MYSQL_USER):$(MYSQL_PASSWORD)@tcp(mysql.enduro-sdps:3306)/enduro
            - name: ENDURO_STORAGE_DATABASE_DSN
              value: $(MYSQL_USER):$(MYSQL_PASSWORD)@tcp(mysql.enduro-sdps:3306)/enduro_storage
            - name: ENDURO_STORAGE_DEFAULTPERMANENTLOCATIONID
              valueFrom:
                secretKeyRef:
                  name: enduro-am-secret
                  key: amss_location_id
            - name: ENDURO_WATCHER_EMBEDDED_KEY
              value: $(MINIO_USER)
            - name: ENDURO_WATCHER_EMBEDDED_SECRET
              value: $(MINIO_PASSWORD)
            - name: ENDURO_TELEMETRY_TRACES_ENABLED
              value: "true"
            - name: ENDURO_TELEMETRY_TRACES_ADDRESS
              value: "grafana-alloy.enduro-sdps:4317"
            - name: ENDURO_TELEMETRY_TRACES_SAMPLING_RATIO
              value: "1.0"
            - name: ENDURO_PRESERVATION_TASKQUEUE
              value: "am"
            - name: ENDURO_AM_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: enduro-am-secret
                  key: address
            - name: ENDURO_AM_USER
              valueFrom:
                secretKeyRef:
                  name: enduro-am-secret
                  key: user
            - name: ENDURO_AM_APIKEY
              valueFrom:
                secretKeyRef:
                  name: enduro-am-secret
                  key: api_key
            - name: ENDURO_AM_TRANSFERSOURCEPATH
              valueFrom:
                secretKeyRef:
                  name: enduro-am-secret
                  key: transfer_source_path
            - name: ENDURO_AM_SFTP_HOST
              valueFrom:
                secretKeyRef:
                  name: enduro-am-secret
                  key: sftp_host
            - name: ENDURO_AM_SFTP_PORT
              valueFrom:
                secretKeyRef:
                  name: enduro-am-secret
                  key: sftp_port
            - name: ENDURO_AM_SFTP_USER
              valueFrom:
                secretKeyRef:
                  name: enduro-am-secret
                  key: sftp_user
            - name: ENDURO_AM_SFTP_REMOTEDIR
              valueFrom:
                secretKeyRef:
                  name: enduro-am-secret
                  key: sftp_remote_dir
            - name: ENDURO_AM_SFTP_KNOWNHOSTSFILE
              value: "/etc/ssh/known_hosts"
            - name: ENDURO_AM_SFTP_PRIVATEKEY_PATH
              value: "/etc/ssh/id_ed25519"
            - name: ENDURO_AM_SFTP_PRIVATEKEY_PASSPHRASE
              valueFrom:
                secretKeyRef:
                  name: enduro-am-secret
                  key: sftp_private_key_passphrase
          volumeMounts:
            - name: ssh-volume
              mountPath: "/etc/ssh"
              readOnly: true
      volumes:
        - name: ssh-secret
          secret:
            secretName: enduro-am-secret
            items:
              - key: .id_ed25519.secret
                defaultMode: 0600
                path: id_ed25519
        - name: ssh-volume
          emptyDir: {}
