# This is the configuration file valid for the development environment. For
# increased security it is possible to encrypt this file. Additionally, any
# parameter can be turned into an environment variable. See the Enduro
# Administrator's manual for further guidance.

#########################################################################
#                                                                       #
#                         GLOBAL CONFIGURATION                          #
#                                                                       #
#  The settings below are used by both the ingest and storage domains.  #
#                                                                       #
#########################################################################

debug = true
debugListen = "127.0.0.1:9001"
# verbosity supports values from 0-128, with 0 as least verbose and 128
# capturing all possible log events.
verbosity = 2

[temporal]
address = "temporal-frontend.enduro-sdps:7233"
namespace = "default"
taskQueue = "global"

[internalapi]
# Address of the internal API server. Used for internal component communication.
# Does NOT support authentication - for security, do not expose this address
# publicly.
listen = "0.0.0.0:9002"

[internalapi.log]
# Path to the internal API log file. Accepts stdout or stderr for console
# output. If `path` is not set, or set to an empty string, logging is disabled.
path = "stdout"

# Log level sets the log verbosity. Valid values are: "debug", "info" (default),
# "warn", and "error" (case-insensitive).
# See https://enduro.readthedocs.io/admin-manual/configuration/#api-logs for
# detailed level information.
level = "warn"

# Format of the log messages. Valid values are: "json" (default) and "text".
format = "text"

[api]
# Address of the API server.
listen = "0.0.0.0:9000"

# CORS Access-Control-Allow-Origin policy for the API server. Defaults to the
# listen address if not set.
corsOrigin = "http://localhost"

[api.log]
# Path to the API log file. Accepts stdout or stderr for console output. If
# `path` is not set, or set to an empty string, logging is disabled.
path = "stdout"

# Log level sets the log verbosity. Valid values are: "debug", "info" (default),
# "warn", and "error" (case-insensitive).
# See https://enduro.readthedocs.io/admin-manual/configuration/#api-logs for
# detailed level information.
level = "warn"

# Format of the log messages. Valid values are: "json" (default) and "text".
format = "text"

[api.auth]
# Enable API authentication. OIDC is the only protocol supported at the
# moment. When enabled the API verifies the access token submitted with
# each request. Clients are responsible for obtaining an access token
# from a configured OIDC provider below.
enabled = true

# Multiple OIDC providers are supported. Add one `[[api.auth.oidc]]` table
# per provider/client pair. For each provider/client pair add an
# `[api.auth.oidc.abac]` section if ABAC is needed. Example:
#
# [[api.auth.oidc]]
# providerURL = "http://keycloak:7470/realms/artefactual"
# clientID = "enduro"
# [api.auth.oidc.abac]
# enabled = true
# claimPath = "attributes.enduro"
# claimPathSeparator = "."
#
# [[api.auth.oidc]]
# providerURL = "http://keycloak:7470/realms/artefactual-internal"
# clientID = "enduro-s2s"
[[api.auth.oidc]]
# OIDC provider URL. Required when auth. is enabled.
providerURL = "http://keycloak:7470/realms/artefactual"
# OIDC client ID. The client ID must be included in the `aud` claim of
# the access token. Required when auth. is enabled.
clientID = "enduro"
# Do not check if the `email_verified` claim is present and set to `true`.
skipEmailVerifiedCheck = false

[api.auth.oidc.abac]
# Enable Attribute Based Access Control (ABAC). If enabled, the API will
# check a configurable multivalue claim against required attributes based
# on each endpoint configuration.
enabled = true
# Claim path of the Enduro attributes within the access token. If the claim
# path is nested then include all fields separated by `claimPathSeparator`
# (see below). E.g. "attributes.enduro" with `claimPathSeparator = "."`.
# Required when ABAC is enabled.
claimPath = "enduro"
# Separator used to split the claim path fields. The default value of "" will
# try to match the claim path as-is to a top-level field from the access token.
claimPathSeparator = ""
# Add a prefix to filter the values of the configured claim. If the claim
# contains values unrelated to Enduro's ABAC, the values relevant to Enduro
# should be prefixed so they are the only values used for access control.
# For example, a claim with values ["enduro:*", "unrelated"] will be filtered
# to a value of ["*"] when `claimValuePrefix = "enduro:"`. The default "" will
# not filter any value.
claimValuePrefix = ""
# Consider the values obtained from the claim as roles and use the
# `rolesMapping` config below to map them to Enduro attributes.
useRoles = false
# A JSON formatted string specifying a mapping from expected roles to Enduro
# attributes. JSON format:
# {
#   "role1": ["attribute1", "attribute2"],
#   "role2": ["attribute1", "attribute2", "attribute3", "attribute4"]
# }
# Example:
# rolesMapping = '{"admin": ["*"], "operator": ["ingest:sips:list", "ingest:sips:read", "ingest:sips:upload", "ingest:sips:workflows:list"], "readonly": ["ingest:sips:list", "ingest:sips:read", "ingest:sips:workflows:list"]}'
rolesMapping = ""

# Secondary verifier for service to service tokens (client credentials).
[[api.auth.oidc]]
providerURL = "http://keycloak:7470/realms/artefactual"
clientID = "enduro-s2s"
skipEmailVerifiedCheck = true

[api.auth.ticket.redis]
address = "redis://redis.enduro-sdps:6379"
prefix = "enduro"

[auditlog]
# filePath is the absolute path to the audit log. The enduro user will need
# write access to the given directory. Rotated logs will use the same directory
# and filename, but with a timestamp appended. If filePath is not set, or set to
# an empty string, audit logging will be disabled.
filepath = "/home/enduro/logs/enduro_audit.log"
# maxSize is the maximum size, in megabytes, of the audit log file. When the
# log file reaches maxSize or greater it will be rotated (default: 100 MB).
maxSize = 100
# compress determines if the rotated log files are compressed using gzip
# (default: false).
compress = false

[bagit]
# checksumAlgorithm sets the hashing algorithm used to generate file checksums
# in created BagIt bag manifests. Valid values are "md5", "sha1", "sha256", and
# "sha512" (the default).
checksumAlgorithm = "sha512"

[bagitValidator]
# cacheDir sets the cache directory used to write runtime artifacts for the
# BagIt validator's runtime and runners. If cacheDir is an empty string or
# omitted, the validator will attempt to create a cache directory in the process
# user's home directory (e.g. /home/enduro/.cache/bagit-gython).
# See https://enduro.readthedocs.io/admin-manual/configuration/#bagit-validation
# for more details.
cacheDir = ""
# poolSize sets the number of bag validation runners available to concurrently
# validate bags. poolSize must be 1 (the default value) or greater.
# See https://enduro.readthedocs.io/admin-manual/configuration/#bagit-validation
# for more details.
poolSize = 1

[telemetry.traces]
enabled = false
address = ""
samplingRatio = 1.0

#########################################################################
#                                                                       #
#                         INGEST CONFIGURATION                          #
#                                                                       #
#         The settings below are only used by the ingest domain.        #
#                                                                       #
#########################################################################

[database]
driver = "mysql"
dsn = "enduro:enduro123@tcp(mysql.enduro-sdps:3306)/enduro"
# migrate determines whether schema migrations are run during Enduro worker
# startup.
migrate = true

[event]
redisAddress = "redis://redis.enduro-sdps:6379"
redisChannel = "enduro-ingest-events"

[extractActivity]
# Sets the default POSIX filesystem permissions applied to directories and files
# after package extraction.
dirMode = "0o700"
fileMode = "0o600"

[validatePremis]
# When enabled, Enduro will check for a premis.xml file in the metadata
# directory of a package during ingest, and if found, attempt to validate it
# against the schema found at the configured xsdPath.
enabled = true
xsdPath = "/home/enduro/premis.xsd"

# Filesystem watched locations ingest SIPs automatically when completed files
# or directories are moved into the watched path.
[[watcher.filesystem]]
name = "filesystem-watched-location"
path = "/home/enduro/internal-storage/watched"
# ignore is an optional regular expression matched against the deposited file
# or directory name. Dot-prefixed names and temporary staging names ending in
# ".tmp" are ignored.
ignore = "(^\\.)|(\\.tmp$)"
# Set inotify to true to prefer filesystem event notifications where
# available. When false, Enduro uses polling.
inotify = false
pollInterval = "200ms"
# retentionPeriod is the duration to retain SIPs before they are deleted after
# a successful ingest. Set to a negative value to disable automatic deletion.
# Set to "0" (default) to delete SIPs immediately after they have been
# ingested. It must be a string format compatible with
# https://pkg.go.dev/time#ParseDuration.
retentionPeriod = "-1s"
# completedDir moves successfully ingested SIPs instead of deleting them.
# It can only be used when retentionPeriod is negative.
completedDir = "/home/enduro/internal-storage/watched-complete"
# workflowType is the processing workflow type related to this watcher.
# Available workflow types are "create aip" and "create and review aip",
# the later only works properly when the preservation system is "a3m".
# Default: "create aip".
workflowType = "create aip"

# The legacy watched-location watcher consumes MinIO Redis notification events.
# The development environment no longer deploys MinIO, so the example remains
# here only as a reference for compatible deployments.
# [watcher.embedded]
# # Defines a given location or object store as a watched location, where zipped
# # packages will be ingested automatically when deposited.
# name = "legacy-minio-events"
# redisAddress = "redis://redis.enduro-sdps:6379"
# redisList = "minio-events"
# endpoint = "http://minio.example:9000"
# pathStyle = true
# key = "example-access-key"
# secret = "example-secret-key"
# region = "us-west-1"
# bucket = "sips"
# # workflowType is the processing workflow type related to this watcher.
# # Available workflow types are "create aip" and "create and review aip",
# # the later only works properly when the preservation system is "a3m".
# # Default: "create aip".
# workflowType = "create aip"
# # retentionPeriod is the duration to retain SIPs before they are deleted after
# # a successful ingest. Set to a negative value to disable automatic deletion of
# # SIPs. Set to "0" (default) to delete SIPs immediately after they have been
# # ingested. It must be a string format compatible with
# # https://pkg.go.dev/time#ParseDuration.
# retentionPeriod = "0"

# Change the taskqueue setting to your prefered preservation system, by default
# it is 'am' (Archivematica). Use 'a3m' to configure a3m instead.
[preservation]
taskqueue = "am"

# a3m configuration. There is no capacity setting here like there is for AM, as
# a3m is not concurrency safe. To enable parallel processing, deploy multiple
# a3m workers with separate a3m instances.
[a3m]
address = "127.0.0.1:7000"
shareDir = "/home/a3m/.local/share/a3m/share"

# https://enduro.readthedocs.io/admin-manual/configuration/#a3m-aip-staging-bucket
[a3m.aipStaging]
url = "file:///home/enduro/internal-storage/storage?metadata=skip&no_tmp_dir=true"

[a3m.processing]
AssignUuidsToDirectories = true
ExamineContents = true
GenerateTransferStructureReport = true
DocumentEmptyDirectories = true
ExtractPackages = true
DeletePackagesAfterExtraction = true
IdentifyTransfer = true
IdentifySubmissionAndMetadata = true
IdentifyBeforeNormalization = true
Normalize = true
TranscribeFiles = true
PerformPolicyChecksOnOriginals = true
PerformPolicyChecksOnPreservationDerivatives = true
AipCompressionLevel = 1
AipCompressionAlgorithm = 6

[am]
address = ""
user = ""
apiKey = ""
processingConfig = "automated"

# capacity limits the number of transfers a worker can start in AM at one time
# (default: 20)
capacity = 20

# pollInterval is the time to wait between AM polling requests in a string
# format compatible with https://pkg.go.dev/time#ParseDuration (Default: 10s).
pollInterval = "10s"

# transferDeadline is the maximum time to wait for a transfer to complete in a
# format compatible with https://pkg.go.dev/time#ParseDuration. Set to "0" for
# no time limit.
transferDeadline = "1h"

# transferSourcePath is the path to an Archivematica transfer source directory.
# It is used in the POST /api/v2beta/package "path" parameter to start a
# transfer via the API. TransferSourcePath must be prefixed with the UUID of an
# AMSS transfer source directory, optionally followed by a relative path from
# the source dir (e.g. "749ef452-fbed-4d50-9072-5f98bc01e52e:sftp_upload"). If
# no transferSourcPath is specified, the default transfer source path will be
# used.
transferSourcePath = ""

# zipPIP specifies whether or not a PIP should be zipped before being sent from
# Enduro to Archivematica.
zipPIP = false

[am.sftp]
host = "" # The Archivematica Storage Service hostname.
port = ""
user = ""

# knownHostsFile is the absolute path to a local SSH "known_hosts" file that
# includes a public host key for the AM SFTP server.
# Default: "/home/[user]/.ssh/known_hosts" (where [user] is your local user).
knownHostsFile = ""

# remoteDir is the directory path, relative to the SFTP root directory, where
# PIPs should be uploaded.
remoteDir = ""

[am.sftp.privateKey]
path = ""
passphrase = ""

[upload]
# maxSize is the maximum upload size allowed by the server in bytes.
# Default: 4294967296 (4 GiB).
maxSize = 4294967296
# retentionPeriod is the duration to retain SIPs before they are deleted after a
# successful ingest. Set to a negative value to disable automatic deletion of SIPs.
# Set to "0" (default) to delete SIPs immediately after they have been ingested.
# It must be a string format compatible with https://pkg.go.dev/time#ParseDuration.
retentionPeriod = "0"

# https://enduro.readthedocs.io/admin-manual/configuration/#internal-storage-configuration
[internalStorage]
url = "file:///home/enduro/internal-storage/ingest?metadata=skip&no_tmp_dir=true"

# sipsource configures a SIP Source location where SIPs can be put and later
# ingested via the Dashboard or API.
[sipsource]
# id uniquely identifies the SIP Source and must be a valid Version 4 UUID.
id = "e6ddb29a-66d1-480e-82eb-fcfef1c825c5"
# name is a human-readable name for the SIP Source.
name = "Filesystem SIP Source"
# retentionPeriod is the duration to retain SIPs before they are deleted after a
# successful ingest. Set to a negative value to disable automatic deletion of SIPs.
# Set to "0" (default) to delete SIPs immediately after they have been ingested.
# It must be a string format compatible with https://pkg.go.dev/time#ParseDuration.
retentionPeriod = "-1s"

# https://enduro.readthedocs.io/admin-manual/configuration/#sip-source-location-bucket
[sipsource.bucket]
url = "file:///home/enduro/internal-storage/sip-source?metadata=skip"

# Configuration for a preprocessing child workflow run before preservation.
# Uncomment to activate. All fields except "extract" are required.
# [[childWorkflows]]
# type = "preprocessing"
# taskQueue = "preprocessing"
# workflowName = "preprocessing"

# # extract determines where SIP extraction, from a zip or other archive format,
# # happens. When set to "true" extraction happens in the preprocessing child
# # workflow. If extract is "false" (default), extraction happens in the parent
# # ingest workflow.
# extract = true

# # sharedPath is the full path to a directory to share files between workflows.
# # sharedPath is required when the preprocessing workflow is enabled. If the
# # preprocessing child workflow is not enabled, this setting is ignored.
# sharedPath = "/home/enduro/preprocessing"

# Configuration to run a poststorage child workflow after storing an AIP.
# Uncomment to activate. All fields are required.
# [[childWorkflows]]
# type = "poststorage"
# taskQueue = "poststorage"
# workflowName = "poststorage"

# Configuration to run a postbatch child workflow after batch ingest of multiple
# AIPs. Uncomment to activate. All fields are required.
# [[childWorkflows]]
# type = "postbatch"
# taskQueue = "postbatch"
# workflowName = "postbatch"

# ingest configures the ingest service.
[ingest]

# allowDuplicates toggles whether a SIP can be ingested more than once.
# The default value (false) will stop ingest with a content error when a SIP
# archive file (e.g. zip) is submitted that has the same checksum as a
# previously ingested SIP. SIPs submitted as a directory are not checked for
# duplicate contents.
#
# See https://enduro.readthedocs.io/admin-manual/configuration/#allowduplicates
# for more details.
allowDuplicates = true

# [ingest.storage] configures ingest as a client of the storage API.
# Use this section for cross-domain integration values:
# - the address of the storage API
# - which permanent location ingest targets by default
[ingest.storage]
address = "enduro.enduro-sdps:9000"

# defaultPermanentLocationId is the UUID of the storage location used for
# permanent AIP storage in the "auto-approve" processing workflow.
# The value of "e0ed8b2a-8ae2-4546-b5d8-f0090919df04" represents the AIP
# storage location UUID defined in the enduro-am-secret.yaml and created
# in the mysql-create-amss-location-job.yaml Kubernetes manifest.
defaultPermanentLocationId = "e0ed8b2a-8ae2-4546-b5d8-f0090919df04"

# Configure OIDC client credentials for ingest to storage API calls. Tokens
# generated by this OIDC provider must be verified by at least one of the
# providers from the full API OIDC configuration.
[ingest.storage.oidc]
# Enable service to service OIDC authentication for storage API requests.
enabled = true
# OIDC provider URL used for token endpoint discovery.
providerURL = "http://keycloak:7470/realms/artefactual"
# Optional token endpoint URL. If set, discovery is skipped.
tokenURL = ""
# OIDC client credentials used for client_credentials token requests.
clientID = "enduro-s2s"
clientSecret = "uSh7f2r4j2U5wA9d7mJ3xP6nQ8cT1vL0"
# Optional scopes requested during token retrieval.
scopes = ""
# Optional audience to include in token endpoint params.
audience = ""
# Refresh token before expiry to avoid edge races.
tokenExpiryLeeway = "30s"
# Retry settings for transient token endpoint failures.
retryMaxAttempts = 3
retryInitialInterval = "500ms"
retryMaxInterval = "2s"
retryBackoffCoefficient = 2.0

#########################################################################
#                                                                       #
#                         STORAGE CONFIGURATION                         #
#                                                                       #
#        The settings below are only used by the storage domain.        #
#                                                                       #
#########################################################################

# [storage] configures the storage service itself (service-owned behavior).
# Keep this separate from [ingest.storage]: ingest consumes the storage API,
# while [storage] defines how the storage domain runs internally.
[storage]
# taskQueue is the Temporal queue used by storage workflows and activities.
# Default: "global".
# Note: storage does not currently define its own Temporal address/namespace.
# It reuses the ingest domain Temporal configuration and client. This is not
# ideal and should be changed in the future.
taskQueue = "global"

[storage.database]
driver = "mysql"
dsn = "enduro:enduro123@tcp(mysql.enduro-sdps:3306)/enduro_storage"
migrate = true

# https://enduro.readthedocs.io/admin-manual/configuration/#internal-location-used-for-storing-staging-aips-and-reports
[storage.internal]
url = "file:///home/enduro/internal-storage/storage?metadata=skip&no_tmp_dir=true"

[storage.event]
redisAddress = "redis://redis.enduro-sdps:6379"
redisChannel = "enduro-storage-events"

[storage.aipDeletion]
# approveAMSS determines whether AIP deletions are automatically approved in the
# Archivematica's Storage Service for AMSS locations. When set to false (default),
# AIP deletions in AMSS locations require manual approval in AMSS. When set to true,
# they are automatically approved by Enduro, this requires AMSS v0.25.0 or later.
approveAMSS = true

# reportTemplatePath specifies the path to the template file used to generate
# AIP deletion reports. If reportTemplatePath is empty or omitted, AIP deletion
# reports will not be generated.
reportTemplatePath = "/home/enduro/Enduro_AIP_deletion_report_v3.tmpl.pdf"
