swagger: "2.0"
info:
    title: Enduro API
    version: 0.0.1
host: localhost:9000
consumes:
    - application/json
produces:
    - application/json
    - application/xml
    - application/gob
paths:
    /about:
        get:
            description: Get information about the system
            operationId: about#about
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/EnduroAbout'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: about about
            tags:
                - about
            x-required-scopes: []
    /ingest/batches:
        get:
            description: |-
                List all ingested Batches

                **Required security scopes for bearer**:
                  * `ingest:batches:list`
            operationId: ingest#list_batches
            parameters:
                - in: query
                  name: identifier
                  required: false
                  type: string
                - format: date-time
                  in: query
                  name: earliest_created_time
                  required: false
                  type: string
                - format: date-time
                  in: query
                  name: latest_created_time
                  required: false
                  type: string
                - enum:
                    - queued
                    - processing
                    - pending
                    - ingested
                    - canceled
                    - failed
                  in: query
                  name: status
                  required: false
                  type: string
                - description: UUID of the Batch uploader
                  format: uuid
                  in: query
                  name: uploader_uuid
                  required: false
                  type: string
                - description: Limit number of results to return
                  format: int64
                  in: query
                  name: limit
                  required: false
                  type: integer
                - description: Offset from the beginning of the found set
                  format: int64
                  in: query
                  name: offset
                  required: false
                  type: integer
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/EnduroIngestBatches'
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestListBatchesNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/IngestListBatchesInternalErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: list_batches ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:batches:list
        post:
            description: |-
                Ingest a Batch from a SIP Source

                **Required security scopes for bearer**:
                  * `ingest:batches:create`
            operationId: ingest#add_batch
            parameters:
                - in: body
                  name: add_batch_request_body
                  required: true
                  schema:
                    $ref: '#/definitions/IngestAddBatchRequestBody'
                    required:
                        - source_id
                        - keys
            responses:
                "201":
                    description: Created response.
                    schema:
                        $ref: '#/definitions/IngestAddBatchResponseBody'
                        required:
                            - uuid
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestAddBatchNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/IngestAddBatchInternalErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: add_batch ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:batches:create
    /ingest/batches/{uuid}:
        get:
            description: |-
                Show Batch by UUID

                **Required security scopes for bearer**:
                  * `ingest:batches:read`
            operationId: ingest#show_batch
            parameters:
                - description: Identifier of Batch to show
                  format: uuid
                  in: path
                  name: uuid
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/EnduroIngestBatch'
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestShowBatchNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/BatchNotFound'
                        required:
                            - message
                            - uuid
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/IngestShowBatchInternalErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: show_batch ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:batches:read
    /ingest/batches/{uuid}/review:
        post:
            description: |-
                Review a Batch awaiting user decision

                **Required security scopes for bearer**:
                  * `ingest:batches:review`
            operationId: ingest#review_batch
            parameters:
                - description: Identifier of Batch to review
                  format: uuid
                  in: path
                  name: uuid
                  required: true
                  type: string
                - in: body
                  name: review_batch_request_body
                  required: true
                  schema:
                    $ref: '#/definitions/IngestReviewBatchRequestBody'
                    required:
                        - continue
            responses:
                "202":
                    description: Accepted response.
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestReviewBatchNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/BatchNotFound'
                        required:
                            - message
                            - uuid
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/IngestReviewBatchInternalErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: review_batch ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:batches:review
    /ingest/monitor:
        get:
            description: Obtain access to the /monitor SSE event stream
            operationId: ingest#monitor
            produces:
                - text/event-stream
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/IngestEvent'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/IngestMonitorInternalErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: monitor ingest
            tags:
                - ingest
            x-required-scopes: []
    /ingest/sip-sources/{uuid}/objects:
        get:
            description: |-
                List the objects in a SIP source

                **Required security scopes for bearer**:
                  * `ingest:sipsources:objects:list`
            operationId: ingest#list_sip_source_objects
            parameters:
                - description: Limit the number of results to return
                  format: int64
                  in: query
                  name: limit
                  required: false
                  type: integer
                - description: Cursor token to get subsequent pages
                  in: query
                  name: cursor
                  required: false
                  type: string
                - description: SIP source identifier -- CURRENTLY NOT USED
                  format: uuid
                  in: path
                  name: uuid
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/EnduroIngestSipsourceObjects'
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestListSipSourceObjectsNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/IngestListSipSourceObjectsNotFoundResponseBody'
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/IngestListSipSourceObjectsInternalErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: list_sip_source_objects ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sipsources:objects:list
    /ingest/sips:
        get:
            description: |-
                List all ingested SIPs

                **Required security scopes for bearer**:
                  * `ingest:sips:list`
            operationId: ingest#list_sips
            parameters:
                - in: query
                  name: name
                  required: false
                  type: string
                - description: Identifier of AIP
                  format: uuid
                  in: query
                  name: aip_uuid
                  required: false
                  type: string
                - format: date-time
                  in: query
                  name: earliest_created_time
                  required: false
                  type: string
                - format: date-time
                  in: query
                  name: latest_created_time
                  required: false
                  type: string
                - enum:
                    - error
                    - failed
                    - queued
                    - processing
                    - pending
                    - ingested
                    - validated
                    - canceled
                  in: query
                  name: status
                  required: false
                  type: string
                - description: UUID of the SIP uploader
                  format: uuid
                  in: query
                  name: uploader_uuid
                  required: false
                  type: string
                - description: UUID of the related Batch
                  format: uuid
                  in: query
                  name: batch_uuid
                  required: false
                  type: string
                - description: Limit number of results to return
                  format: int64
                  in: query
                  name: limit
                  required: false
                  type: integer
                - description: Offset from the beginning of the found set
                  format: int64
                  in: query
                  name: offset
                  required: false
                  type: integer
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/EnduroIngestSips'
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestListSipsNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: list_sips ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sips:list
        post:
            description: |-
                Ingest a SIP from a SIP Source

                **Required security scopes for bearer**:
                  * `ingest:sips:create`
            operationId: ingest#add_sip
            parameters:
                - description: Identifier of SIP source -- CURRENTLY NOT USED
                  format: uuid
                  in: query
                  name: source_id
                  required: true
                  type: string
                - description: Key of the item to ingest
                  in: query
                  name: key
                  required: true
                  type: string
            responses:
                "201":
                    description: Created response.
                    schema:
                        $ref: '#/definitions/IngestAddSipResponseBody'
                        required:
                            - uuid
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestAddSipNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/IngestAddSipInternalErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: add_sip ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sips:create
    /ingest/sips/{uuid}:
        get:
            description: |-
                Show SIP by ID

                **Required security scopes for bearer**:
                  * `ingest:sips:read`
            operationId: ingest#show_sip
            parameters:
                - description: Identifier of SIP to show
                  format: uuid
                  in: path
                  name: uuid
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/EnduroIngestSip'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/SIPNotFound'
                        required:
                            - message
                            - uuid
                "409":
                    description: Conflict response.
                    schema:
                        $ref: '#/definitions/IngestShowSipNotAvailableResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: show_sip ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sips:read
    /ingest/sips/{uuid}/confirm:
        post:
            description: |-
                Signal the SIP has been reviewed and accepted

                **Required security scopes for bearer**:
                  * `ingest:sips:review`
            operationId: ingest#confirm_sip
            parameters:
                - description: Identifier of SIP to look up
                  format: uuid
                  in: path
                  name: uuid
                  required: true
                  type: string
                - in: body
                  name: confirm_sip_request_body
                  required: true
                  schema:
                    $ref: '#/definitions/IngestConfirmSipRequestBody'
                    required:
                        - location_uuid
            responses:
                "202":
                    description: Accepted response.
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestConfirmSipNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/SIPNotFound'
                        required:
                            - message
                            - uuid
                "409":
                    description: Conflict response.
                    schema:
                        $ref: '#/definitions/IngestConfirmSipNotAvailableResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: confirm_sip ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sips:review
    /ingest/sips/{uuid}/decision:
        get:
            description: |-
                Show the active child workflow decision request for a SIP

                **Required security scopes for bearer**:
                  * `ingest:sips:decision`
            operationId: ingest#show_sip_decision
            parameters:
                - description: Identifier of SIP to look up
                  format: uuid
                  in: path
                  name: uuid
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/EnduroIngestSipDecision'
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestShowSipDecisionNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/SIPNotFound'
                        required:
                            - message
                            - uuid
                "409":
                    description: Conflict response.
                    schema:
                        $ref: '#/definitions/IngestShowSipDecisionNotAvailableResponseBody'
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/IngestShowSipDecisionInternalErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: show_sip_decision ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sips:decision
        post:
            description: |-
                Submit a selected child workflow decision option for a SIP

                **Required security scopes for bearer**:
                  * `ingest:sips:decision`
            operationId: ingest#submit_sip_decision
            parameters:
                - description: Identifier of SIP to look up
                  format: uuid
                  in: path
                  name: uuid
                  required: true
                  type: string
                - in: body
                  name: submit_sip_decision_request_body
                  required: true
                  schema:
                    $ref: '#/definitions/IngestSubmitSipDecisionRequestBody'
                    required:
                        - option
            responses:
                "202":
                    description: Accepted response.
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestSubmitSipDecisionNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/SIPNotFound'
                        required:
                            - message
                            - uuid
                "409":
                    description: Conflict response.
                    schema:
                        $ref: '#/definitions/IngestSubmitSipDecisionNotAvailableResponseBody'
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/IngestSubmitSipDecisionInternalErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: submit_sip_decision ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sips:decision
    /ingest/sips/{uuid}/download:
        get:
            tags:
                - ingest
            summary: download_sip ingest
            description: Download the failed package related to a SIP. It will be the original SIP or the transformed PIP, based on the SIP's `failed_as` value.
            operationId: ingest#download_sip
            parameters:
                - name: uuid
                  in: path
                  description: Identifier of the SIP to download
                  required: true
                  type: string
                  format: uuid
            responses:
                "200":
                    description: OK response.
                    headers:
                        Content-Disposition:
                            type: string
                        Content-Length:
                            type: integer
                            format: int64
                        Content-Type:
                            type: string
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestDownloadSipNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/SIPNotFound'
                        required:
                            - message
                            - uuid
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/IngestDownloadSipInternalErrorResponseBody'
            schemes:
                - http
            security: []
        post:
            description: |-
                Request access to SIP download

                **Required security scopes for bearer**:
                  * `ingest:sips:download`
            operationId: ingest#download_sip_request
            parameters:
                - description: Identifier of the SIP to download
                  format: uuid
                  in: path
                  name: uuid
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestDownloadSipRequestNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/SIPNotFound'
                        required:
                            - message
                            - uuid
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/IngestDownloadSipRequestInternalErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: download_sip_request ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sips:download
    /ingest/sips/{uuid}/reject:
        post:
            description: |-
                Signal the SIP has been reviewed and rejected

                **Required security scopes for bearer**:
                  * `ingest:sips:review`
            operationId: ingest#reject_sip
            parameters:
                - description: Identifier of SIP to look up
                  format: uuid
                  in: path
                  name: uuid
                  required: true
                  type: string
            responses:
                "202":
                    description: Accepted response.
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestRejectSipNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/SIPNotFound'
                        required:
                            - message
                            - uuid
                "409":
                    description: Conflict response.
                    schema:
                        $ref: '#/definitions/IngestRejectSipNotAvailableResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: reject_sip ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sips:review
    /ingest/sips/{uuid}/workflows:
        get:
            description: |-
                List all workflows for a SIP

                **Required security scopes for bearer**:
                  * `ingest:sips:workflows:list`
            operationId: ingest#list_sip_workflows
            parameters:
                - description: Identifier of SIP to look up
                  format: uuid
                  in: path
                  name: uuid
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/EnduroIngestSipWorkflows'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/SIPNotFound'
                        required:
                            - message
                            - uuid
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: list_sip_workflows ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sips:workflows:list
    /ingest/sips/upload:
        post:
            description: |-
                Upload a SIP to trigger an ingest workflow

                **Required security scopes for bearer**:
                  * `ingest:sips:upload`
            operationId: ingest#upload_sip
            parameters:
                - default: multipart/form-data; boundary=goa
                  description: Content-Type header, must define value for multipart boundary.
                  in: header
                  name: Content-Type
                  pattern: multipart/[^;]+; boundary=.+
                  required: false
                  type: string
            responses:
                "202":
                    description: Accepted response.
                    schema:
                        $ref: '#/definitions/IngestUploadSipResponseBody'
                        required:
                            - uuid
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/IngestUploadSipInvalidMultipartRequestResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        type: string
                "403":
                    description: Forbidden response.
                    schema:
                        type: string
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/IngestUploadSipInternalErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
            summary: upload_sip ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sips:upload
    /ingest/users:
        get:
            description: |-
                List all users

                **Required security scopes for bearer**:
                  * `ingest:users:list`
            operationId: ingest#list_users
            parameters:
                - description: Email of the user
                  in: query
                  name: email
                  required: false
                  type: string
                - description: Name of the user
                  in: query
                  name: name
                  required: false
                  type: string
                - description: Limit number of results to return
                  format: int64
                  in: query
                  name: limit
                  required: false
                  type: integer
                - description: Offset from the beginning of the found set
                  format: int64
                  in: query
                  name: offset
                  required: false
                  type: integer
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/EnduroIngestUsers'
                "400":
                    description: Bad Request response.
