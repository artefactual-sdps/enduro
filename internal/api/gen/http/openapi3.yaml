openapi: 3.0.3
info:
    title: Enduro API
    version: 0.0.1
servers:
    - url: http://localhost:9000
paths:
    /about:
        get:
            description: Get information about the system
            operationId: about#about
            responses:
                "200":
                    content:
                        application/json:
                            example:
                                child_workflows:
                                    - task_queue: abc123
                                      type: poststorage
                                      workflow_name: abc123
                                preservation_system: abc123
                                upload_max_size: 1
                                version: abc123
                            schema:
                                $ref: '#/components/schemas/EnduroAbout'
                    description: OK response.
                "401":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'unauthorized: Unauthorized response.'
            security:
                - bearer_header_Authorization: []
            summary: about about
            tags:
                - about
            x-required-scopes: []
    /ingest/batches:
        get:
            description: List all ingested Batches
            operationId: ingest#list_batches
            parameters:
                - allowEmptyValue: true
                  example: abc123
                  in: query
                  name: identifier
                  schema:
                    example: abc123
                    type: string
                - allowEmptyValue: true
                  example: "1970-01-01T00:00:01Z"
                  in: query
                  name: earliest_created_time
                  schema:
                    example: "1970-01-01T00:00:01Z"
                    format: date-time
                    type: string
                - allowEmptyValue: true
                  example: "1970-01-01T00:00:01Z"
                  in: query
                  name: latest_created_time
                  schema:
                    example: "1970-01-01T00:00:01Z"
                    format: date-time
                    type: string
                - allowEmptyValue: true
                  example: processing
                  in: query
                  name: status
                  schema:
                    enum:
                        - queued
                        - processing
                        - pending
                        - ingested
                        - canceled
                        - failed
                    example: processing
                    type: string
                - allowEmptyValue: true
                  description: UUID of the Batch uploader
                  example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                  in: query
                  name: uploader_uuid
                  schema:
                    description: UUID of the Batch uploader
                    example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                    format: uuid
                    type: string
                - allowEmptyValue: true
                  description: Limit number of results to return
                  example: 1
                  in: query
                  name: limit
                  schema:
                    description: Limit number of results to return
                    example: 1
                    format: int64
                    type: integer
                - allowEmptyValue: true
                  description: Offset from the beginning of the found set
                  example: 1
                  in: query
                  name: offset
                  schema:
                    description: Offset from the beginning of the found set
                    example: 1
                    format: int64
                    type: integer
            responses:
                "200":
                    content:
                        application/json:
                            example:
                                items:
                                    - completed_at: "1970-01-01T00:00:01Z"
                                      created_at: "1970-01-01T00:00:01Z"
                                      identifier: abc123
                                      sips_count: 1
                                      started_at: "1970-01-01T00:00:01Z"
                                      status: processing
                                      uploader_email: abc123
                                      uploader_name: abc123
                                      uploader_uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                      uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                page:
                                    limit: 1
                                    offset: 1
                                    total: 1
                            schema:
                                $ref: '#/components/schemas/EnduroIngestBatches'
                    description: OK response.
                "400":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'not_valid: Bad Request response.'
                "401":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'unauthorized: Unauthorized response.'
                "403":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'forbidden: Forbidden response.'
                "500":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'internal_error: Internal Server Error response.'
            security:
                - bearer_header_Authorization: []
            summary: list_batches ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:batches:list
        post:
            description: Ingest a Batch from a SIP Source
            operationId: ingest#add_batch
            requestBody:
                content:
                    application/json:
                        example:
                            identifier: abc123
                            keys:
                                - abc123
                            source_id: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                        schema:
                            $ref: '#/components/schemas/AddBatchRequestBody'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            example:
                                uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                            schema:
                                $ref: '#/components/schemas/AddSipResponseBody'
                    description: Created response.
                "400":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'not_valid: Bad Request response.'
                "401":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'unauthorized: Unauthorized response.'
                "403":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'forbidden: Forbidden response.'
                "500":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'internal_error: Internal Server Error response.'
            security:
                - bearer_header_Authorization: []
            summary: add_batch ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:batches:create
    /ingest/batches/{uuid}:
        get:
            description: Show Batch by UUID
            operationId: ingest#show_batch
            parameters:
                - description: Identifier of Batch to show
                  example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                  in: path
                  name: uuid
                  required: true
                  schema:
                    description: Identifier of Batch to show
                    example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                    format: uuid
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            example:
                                completed_at: "1970-01-01T00:00:01Z"
                                created_at: "1970-01-01T00:00:01Z"
                                identifier: abc123
                                sips_count: 1
                                started_at: "1970-01-01T00:00:01Z"
                                status: processing
                                uploader_email: abc123
                                uploader_name: abc123
                                uploader_uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                            schema:
                                $ref: '#/components/schemas/EnduroIngestBatch'
                    description: OK response.
                "400":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'not_valid: Bad Request response.'
                "401":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'unauthorized: Unauthorized response.'
                "403":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'forbidden: Forbidden response.'
                "404":
                    content:
                        application/json:
                            example:
                                message: abc123
                                uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                            schema:
                                $ref: '#/components/schemas/BatchNotFound'
                    description: 'not_found: Batch not found'
                "500":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'internal_error: Internal Server Error response.'
            security:
                - bearer_header_Authorization: []
            summary: show_batch ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:batches:read
    /ingest/batches/{uuid}/review:
        post:
            description: Review a Batch awaiting user decision
            operationId: ingest#review_batch
            parameters:
                - description: Identifier of Batch to review
                  example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                  in: path
                  name: uuid
                  required: true
                  schema:
                    description: Identifier of Batch to review
                    example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                    format: uuid
                    type: string
            requestBody:
                content:
                    application/json:
                        example:
                            continue: false
                        schema:
                            $ref: '#/components/schemas/ReviewBatchRequestBody'
                required: true
            responses:
                "202":
                    description: Accepted response.
                "400":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'not_valid: Bad Request response.'
                "401":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'unauthorized: Unauthorized response.'
                "403":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'forbidden: Forbidden response.'
                "404":
                    content:
                        application/json:
                            example:
                                message: abc123
                                uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                            schema:
                                $ref: '#/components/schemas/BatchNotFound'
                    description: 'not_found: Batch not found'
                "500":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'internal_error: Internal Server Error response.'
            security:
                - bearer_header_Authorization: []
            summary: review_batch ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:batches:review
    /ingest/monitor:
        get:
            description: Obtain access to the /monitor SSE event stream
            operationId: ingest#monitor
            responses:
                "101":
                    content:
                        application/json:
                            example:
                                value:
                                    item:
                                        aip_uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                        batch_identifier: abc123
                                        batch_status: processing
                                        batch_uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                        completed_at: "1970-01-01T00:00:01Z"
                                        created_at: "1970-01-01T00:00:01Z"
                                        failed_as: PIP
                                        failed_key: abc123
                                        file_count: 1
                                        name: abc123
                                        started_at: "1970-01-01T00:00:01Z"
                                        status: failed
                                        uploader_email: abc123
                                        uploader_name: abc123
                                        uploader_uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                        uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                    uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                            schema:
                                $ref: '#/components/schemas/IngestEvent'
                    description: Switching Protocols response.
                "401":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'unauthorized: Unauthorized response.'
                "403":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'forbidden: Forbidden response.'
                "500":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'internal_error: Internal Server Error response.'
            security:
                - bearer_header_Authorization: []
            summary: monitor ingest
            tags:
                - ingest
            x-required-scopes: []
    /ingest/sip-sources/{uuid}/objects:
        get:
            description: List the objects in a SIP source
            operationId: ingest#list_sip_source_objects
            parameters:
                - allowEmptyValue: true
                  description: Limit the number of results to return
                  example: 1
                  in: query
                  name: limit
                  schema:
                    description: Limit the number of results to return
                    example: 1
                    format: int64
                    type: integer
                - allowEmptyValue: true
                  description: Cursor token to get subsequent pages
                  example: abc123
                  in: query
                  name: cursor
                  schema:
                    description: Cursor token to get subsequent pages
                    example: abc123
                    type: string
                - description: SIP source identifier -- CURRENTLY NOT USED
                  example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                  in: path
                  name: uuid
                  required: true
                  schema:
                    description: SIP source identifier -- CURRENTLY NOT USED
                    example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                    format: uuid
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            example:
                                limit: 1
                                next: abc123
                                objects:
                                    - is_dir: false
                                      key: abc123
                                      mod_time: "1970-01-01T00:00:01Z"
                                      size: 1
                            schema:
                                $ref: '#/components/schemas/EnduroIngestSipsourceObjects'
                    description: OK response.
                "400":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'not_valid: Bad Request response.'
                "401":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'unauthorized: Unauthorized response.'
                "403":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'forbidden: Forbidden response.'
                "404":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'not_found: Not Found response.'
                "500":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'internal_error: Internal Server Error response.'
            security:
                - bearer_header_Authorization: []
            summary: list_sip_source_objects ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sipsources:objects:list
    /ingest/sips:
        get:
            description: List all ingested SIPs
            operationId: ingest#list_sips
            parameters:
                - allowEmptyValue: true
                  example: abc123
                  in: query
                  name: name
                  schema:
                    example: abc123
                    type: string
                - allowEmptyValue: true
                  description: Identifier of AIP
                  example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                  in: query
                  name: aip_uuid
                  schema:
                    description: Identifier of AIP
                    example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                    format: uuid
                    type: string
                - allowEmptyValue: true
                  example: "1970-01-01T00:00:01Z"
                  in: query
                  name: earliest_created_time
                  schema:
                    example: "1970-01-01T00:00:01Z"
                    format: date-time
                    type: string
                - allowEmptyValue: true
                  example: "1970-01-01T00:00:01Z"
                  in: query
                  name: latest_created_time
                  schema:
                    example: "1970-01-01T00:00:01Z"
                    format: date-time
                    type: string
                - allowEmptyValue: true
                  example: failed
                  in: query
                  name: status
                  schema:
                    enum:
                        - error
                        - failed
                        - queued
                        - processing
                        - pending
                        - ingested
                        - validated
                        - canceled
                    example: failed
                    type: string
                - allowEmptyValue: true
                  description: UUID of the SIP uploader
                  example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                  in: query
                  name: uploader_uuid
                  schema:
                    description: UUID of the SIP uploader
                    example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                    format: uuid
                    type: string
                - allowEmptyValue: true
                  description: UUID of the related Batch
                  example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                  in: query
                  name: batch_uuid
                  schema:
                    description: UUID of the related Batch
                    example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                    format: uuid
                    type: string
                - allowEmptyValue: true
                  description: Limit number of results to return
                  example: 1
                  in: query
                  name: limit
                  schema:
                    description: Limit number of results to return
                    example: 1
                    format: int64
                    type: integer
                - allowEmptyValue: true
                  description: Offset from the beginning of the found set
                  example: 1
                  in: query
                  name: offset
                  schema:
                    description: Offset from the beginning of the found set
                    example: 1
                    format: int64
                    type: integer
            responses:
                "200":
                    content:
                        application/json:
                            example:
                                items:
                                    - aip_uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                      batch_identifier: abc123
                                      batch_status: processing
                                      batch_uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                      completed_at: "1970-01-01T00:00:01Z"
                                      created_at: "1970-01-01T00:00:01Z"
                                      failed_as: PIP
                                      failed_key: abc123
                                      file_count: 1
                                      name: abc123
                                      started_at: "1970-01-01T00:00:01Z"
                                      status: failed
                                      uploader_email: abc123
                                      uploader_name: abc123
                                      uploader_uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                      uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                page:
                                    limit: 1
                                    offset: 1
                                    total: 1
                            schema:
                                $ref: '#/components/schemas/EnduroIngestSips'
                    description: OK response.
                "400":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'not_valid: Bad Request response.'
                "401":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'unauthorized: Unauthorized response.'
                "403":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'forbidden: Forbidden response.'
            security:
                - bearer_header_Authorization: []
            summary: list_sips ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sips:list
        post:
            description: Ingest a SIP from a SIP Source
            operationId: ingest#add_sip
            parameters:
                - allowEmptyValue: true
                  description: Identifier of SIP source -- CURRENTLY NOT USED
                  example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                  in: query
                  name: source_id
                  required: true
                  schema:
                    description: Identifier of SIP source -- CURRENTLY NOT USED
                    example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                    format: uuid
                    type: string
                - allowEmptyValue: true
                  description: Key of the item to ingest
                  example: abc123
                  in: query
                  name: key
                  required: true
                  schema:
                    description: Key of the item to ingest
                    example: abc123
                    type: string
            responses:
                "201":
                    content:
                        application/json:
                            example:
                                uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                            schema:
                                $ref: '#/components/schemas/AddSipResponseBody'
                    description: Created response.
                "400":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'not_valid: Bad Request response.'
                "401":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'unauthorized: Unauthorized response.'
                "403":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'forbidden: Forbidden response.'
                "500":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'internal_error: Internal Server Error response.'
            security:
                - bearer_header_Authorization: []
            summary: add_sip ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sips:create
    /ingest/sips/{uuid}:
        get:
            description: Show SIP by ID
            operationId: ingest#show_sip
            parameters:
                - description: Identifier of SIP to show
                  example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                  in: path
                  name: uuid
                  required: true
                  schema:
                    description: Identifier of SIP to show
                    example: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                    format: uuid
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            example:
                                aip_uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                batch_identifier: abc123
                                batch_status: processing
                                batch_uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                completed_at: "1970-01-01T00:00:01Z"
                                created_at: "1970-01-01T00:00:01Z"
                                failed_as: PIP
                                failed_key: abc123
                                file_count: 1
                                name: abc123
                                started_at: "1970-01-01T00:00:01Z"
                                status: failed
                                uploader_email: abc123
                                uploader_name: abc123
                                uploader_uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                                uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                            schema:
                                $ref: '#/components/schemas/EnduroIngestSip'
                    description: OK response.
                "401":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'unauthorized: Unauthorized response.'
                "403":
                    content:
                        application/json:
                            example: abc123
                            schema:
                                example: abc123
                                type: string
                    description: 'forbidden: Forbidden response.'
                "404":
                    content:
                        application/json:
                            example:
                                message: abc123
                                uuid: d1845cb6-a5ea-474a-9ab8-26f9bcd919f5
                            schema:
                                $ref: '#/components/schemas/SIPNotFound'
                    description: 'not_found: SIP not found'
                "409":
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: 'not_available: Conflict response.'
            security:
                - bearer_header_Authorization: []
            summary: show_sip ingest
            tags:
                - ingest
            x-required-scopes:
                - ingest:sips:read
    /ingest/sips/{uuid}/confirm:
        post:
            description: Signal the SIP has been reviewed and accepted
            operationId: ingest#confirm_sip
